<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — CampusLink</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet"/>
  <style>
    :root{--pink:#FF6B9D;--purple:#9B59F5;--cyan:#06D6A0;--yellow:#FFD166;--bg:#0F0F1A;--card:#1A1A2E;--text:#F0F0FF;--muted:#8888AA;--border:rgba(255,255,255,0.08);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);padding-top:62px;}
    .page{max-width:700px;margin:0 auto;padding:24px 16px;}

    /* PROFILE HEADER */
    .profile-header{
      background:var(--card);border:1px solid var(--border);border-radius:24px;
      padding:28px;margin-bottom:20px;position:relative;overflow:hidden;
    }
    .profile-header::before{
      content:'';position:absolute;top:0;left:0;right:0;height:80px;
      background:linear-gradient(135deg,var(--pink),var(--purple),var(--cyan));
      opacity:0.15;
    }
    .ph-top{display:flex;gap:18px;align-items:flex-end;margin-bottom:16px;position:relative;}
    .big-avatar{
      width:80px;height:80px;border-radius:50%;
      background:linear-gradient(135deg,var(--pink),var(--purple));
      display:flex;align-items:center;justify-content:center;
      font-size:1.8rem;font-weight:900;color:white;
      border:3px solid var(--bg);flex-shrink:0;
    }
    .ph-info{flex:1;}
    .ph-name{font-size:1.4rem;font-weight:900;margin-bottom:4px;}
    .ph-college{font-size:0.88rem;color:var(--muted);}
    .ph-branch{font-size:0.78rem;color:var(--cyan);}
    .ph-bio{font-size:0.88rem;line-height:1.6;color:var(--muted);margin-bottom:16px;}
    .ph-stats{display:flex;gap:20px;margin-bottom:16px;}
    .ph-stat{text-align:center;}
    .ph-stat-val{font-size:1.2rem;font-weight:900;color:var(--yellow);}
    .ph-stat-label{font-size:0.72rem;color:var(--muted);}
    .ph-skills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
    .skill-tag{padding:4px 12px;border-radius:20px;font-size:0.75rem;font-weight:700;background:rgba(155,89,245,0.15);color:var(--purple);}
    .interest-tag{padding:4px 12px;border-radius:20px;font-size:0.75rem;font-weight:700;background:rgba(6,214,160,0.12);color:var(--cyan);}
    .btn-edit{
      padding:8px 20px;background:linear-gradient(135deg,var(--pink),var(--purple));
      border:none;border-radius:12px;color:white;font-family:'Nunito',sans-serif;
      font-weight:800;font-size:0.85rem;cursor:pointer;transition:all 0.2s;
    }
    .btn-edit:hover{transform:translateY(-1px);}
    .badges-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
    .badge-item{padding:4px 12px;border-radius:20px;font-size:0.75rem;font-weight:700;background:rgba(255,209,102,0.15);color:var(--yellow);}

    /* EDIT CARD */
    .edit-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;margin-bottom:20px;display:none;}
    .edit-card.show{display:block;}
    .edit-title{font-size:1.1rem;font-weight:900;margin-bottom:18px;}
    .field{margin-bottom:14px;}
    .field label{display:block;font-size:0.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;}
    .field input,.field textarea,.field select{
      width:100%;padding:10px 14px;background:rgba(255,255,255,0.05);
      border:1.5px solid var(--border);border-radius:12px;
      color:var(--text);font-family:'Nunito',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.3s;
    }
    .field input:focus,.field textarea:focus{border-color:var(--purple);}
    .field textarea{resize:none;min-height:70px;}
    .field select option{background:var(--card);}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .pills-edit{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
    .pill-e{
      padding:4px 12px;border-radius:20px;font-size:0.75rem;font-weight:700;
      cursor:pointer;border:1.5px solid var(--border);color:var(--muted);
      background:transparent;transition:all 0.2s;
    }
    .pill-e.active{background:linear-gradient(135deg,var(--purple),var(--pink));border-color:transparent;color:white;}
    .edit-actions{display:flex;gap:10px;margin-top:16px;}
    .btn-save{flex:1;padding:10px;background:linear-gradient(135deg,var(--pink),var(--purple));border:none;border-radius:12px;color:white;font-family:'Nunito',sans-serif;font-weight:800;cursor:pointer;}
    .btn-cancel{padding:10px 16px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;}

    /* CONNECTION REQUESTS */
    .section-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:16px;}
    .section-title{font-size:1rem;font-weight:900;margin-bottom:14px;}
    .req-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
    .req-item:last-child{border-bottom:none;}
    .req-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--purple));display:flex;align-items:center;justify-content:center;font-weight:800;color:white;font-size:0.85rem;}
    .req-info{flex:1;}
    .req-name{font-weight:700;font-size:0.88rem;}
    .req-college{font-size:0.72rem;color:var(--muted);}
    .btn-accept{padding:6px 14px;background:linear-gradient(135deg,var(--cyan),#06D6A0);border:none;border-radius:8px;color:var(--bg);font-family:'Nunito',sans-serif;font-weight:700;font-size:0.78rem;cursor:pointer;}
    .loading{text-align:center;padding:20px;color:var(--muted);}
  </style>
</head>
<body>
<script src="nav.js"></script>
<div class="page">
  <div id="profileContent"><div class="loading">Loading profile... 👤</div></div>
</div>

<script>
var me = JSON.parse(localStorage.getItem('user')||'{}');
window.addEventListener('DOMContentLoaded', function() {
  authGuard();
  me = JSON.parse(localStorage.getItem('user')||'{}');
  loadProfile();
});
let editSkills = [];
let editInterests = [];

const SKILLS = ['HTML','CSS','JavaScript','Python','Java','React','Node.js','ML/AI','DSA','UI/UX','C++','PHP','Flutter','Android'];
const INTERESTS = ['Hackathons','Coding','Music','Gaming','Sports','Art','Reading','Entrepreneurship','Research','Photography'];

async function loadProfile() {
  const data = await apiFetch('/users/'+me._id);
  if (!data) return;
  me = {...me, ...data};
  localStorage.setItem('user', JSON.stringify(me));
  editSkills = [...(me.skills||[])];
  editInterests = [...(me.interests||[])];
  renderProfile();
}

function renderProfile() {
  const initial = me.name ? me.name[0].toUpperCase() : '?';
  document.getElementById('profileContent').innerHTML = `
    <div class="profile-header">
      <div class="ph-top">
        <div class="big-avatar" style="cursor:pointer;position:relative" onclick="document.getElementById('avatarInput').click()" title="Click to change photo">
        ${me.avatar ? '<img src="'+me.avatar+'" style="width:100%;height:100%;object-fit:cover;border-radius:50%"/>' : initial}
        <div style="position:absolute;bottom:0;right:0;background:var(--purple);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:0.7rem">✏️</div>
      </div>
      <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="uploadAvatar(this)"/>
        <div class="ph-info">
          <div class="ph-name">${me.name||'Student'}</div>
          <div class="ph-college">🏫 ${me.college||'N/A'}</div>
          <div class="ph-branch">${me.branch||''} ${me.year?'· '+me.year:''}</div>
        </div>
        <button class="btn-edit" onclick="toggleEdit()">✏️ Edit Profile</button>
      </div>
      <div class="ph-bio">${me.bio||'No bio yet. Tell us about yourself!'}</div>
      <div class="ph-stats">
        <div class="ph-stat"><div class="ph-stat-val">${me.points||0}</div><div class="ph-stat-label">Points</div></div>
        <div class="ph-stat"><div class="ph-stat-val">${(me.connections||[]).length}</div><div class="ph-stat-label">Connections</div></div>
        <div class="ph-stat"><div class="ph-stat-val">${(me.badges||[]).length}</div><div class="ph-stat-label">Badges</div></div>
      </div>
      ${me.skills?.length?`<div style="margin-bottom:8px;font-size:0.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em">Skills</div><div class="ph-skills">${me.skills.map(s=>`<span class="skill-tag">${s}</span>`).join('')}</div>`:''}
      ${me.interests?.length?`<div style="margin:10px 0 6px;font-size:0.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em">Interests</div><div class="ph-skills">${me.interests.map(s=>`<span class="interest-tag">${s}</span>`).join('')}</div>`:''}
      ${me.badges?.length?`<div style="margin:10px 0 6px;font-size:0.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em">Badges</div><div class="badges-row">${me.badges.map(b=>`<span class="badge-item">🏅 ${b}</span>`).join('')}</div>`:''}
    </div>

    <!-- EDIT CARD -->
    <div class="edit-card" id="editCard">
      <div class="edit-title">✏️ Edit Profile</div>
      <div class="row2">
        <div class="field"><label>Name</label><input id="eName" value="${me.name||''}"/></div>
        <div class="field"><label>College</label><input id="eCollege" value="${me.college||''}"/></div>
      </div>
      <div class="row2">
        <div class="field"><label>Year</label>
          <select id="eYear">
            <option ${me.year==='1st Year'?'selected':''}>1st Year</option>
            <option ${me.year==='2nd Year'?'selected':''}>2nd Year</option>
            <option ${me.year==='3rd Year'?'selected':''}>3rd Year</option>
            <option ${me.year==='4th Year'?'selected':''}>4th Year</option>
          </select>
        </div>
        <div class="field"><label>Branch</label><input id="eBranch" value="${me.branch||''}"/></div>
      </div>
      <div class="field"><label>Bio</label><textarea id="eBio">${me.bio||''}</textarea></div>
      <div class="field">
        <label>Skills</label>
        <div class="pills-edit" id="skillPillsEdit">
          ${SKILLS.map(s=>`<button class="pill-e ${editSkills.includes(s)?'active':''}" onclick="toggleEditPill(this,this.textContent,'skill')">${s}</button>`).join('')}
        </div>
      </div>
      <div class="field">
        <label>Interests</label>
        <div class="pills-edit">
          ${INTERESTS.map(s=>`<button class="pill-e ${editInterests.includes(s)?'active':''}" onclick="toggleEditPill(this,this.textContent,'interest')">${s}</button>`).join('')}
        </div>
      </div>
      <div class="edit-actions">
        <button class="btn-cancel" onclick="toggleEdit()">Cancel</button>
        <button class="btn-save" onclick="saveProfile()">💾 Save Changes</button>
      </div>
    </div>

    <!-- CONNECTION REQUESTS -->
    <div class="section-card" id="reqSection" style="display:${me.connectionRequests?.length?'block':'none'}">
      <div class="section-title">🤝 Connection Requests (${(me.connectionRequests||[]).length})</div>
      <div id="reqList">${(me.connectionRequests||[]).map(r=>`
        <div class="req-item" id="req-${r._id||r}">
          <div class="req-avatar">${r.name?r.name[0].toUpperCase():'?'}</div>
          <div class="req-info">
            <div class="req-name">${r.name||'Student'}</div>
            <div class="req-college">${r.college||''}</div>
          </div>
          <button class="btn-accept" onclick="acceptConn('${r._id||r}')">✅ Accept</button>
        </div>
      `).join('')}</div>
    </div>

    <!-- CONNECTIONS -->
    <div class="section-card">
      <div class="section-title">👥 Connections (${(me.connections||[]).length})</div>
      ${(me.connections||[]).length?
        (me.connections||[]).map(c=>`
          <div class="req-item">
            <div class="req-avatar">${c.name?c.name[0].toUpperCase():'?'}</div>
            <div class="req-info">
              <div class="req-name">${c.name||'Student'}</div>
              <div class="req-college">${c.college||''}</div>
            </div>
            <a href="chat.html?user=${c._id}" style="padding:6px 12px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:8px;color:var(--text);text-decoration:none;font-size:0.78rem;font-weight:700">💬 Chat</a>
          </div>
        `).join('')
        : '<div style="color:var(--muted);font-size:0.85rem;padding:8px 0">No connections yet. Discover students! 🔍</div>'
      }
    </div>
  `;
}

function toggleEdit() {
  document.getElementById('editCard')?.classList.toggle('show');
}

function toggleEditPill(el, val, type) {
  el.classList.toggle('active');
  if (type==='skill') {
    editSkills = editSkills.includes(val) ? editSkills.filter(s=>s!==val) : [...editSkills,val];
  } else {
    editInterests = editInterests.includes(val) ? editInterests.filter(s=>s!==val) : [...editInterests,val];
  }
}

async function saveProfile() {
  const body = {
    name: document.getElementById('eName').value,
    college: document.getElementById('eCollege').value,
    year: document.getElementById('eYear').value,
    branch: document.getElementById('eBranch').value,
    bio: document.getElementById('eBio').value,
    skills: editSkills,
    interests: editInterests
  };
  const data = await apiFetch('/users/profile', {method:'PUT', body:JSON.stringify(body)});
  if (!data) return;
  me = {...me, ...data};
  localStorage.setItem('user', JSON.stringify(me));
  renderProfile();
}

async function uploadAvatar(input) {
  var file = input.files[0];
  if (!file) return;
  var formData = new FormData();
  formData.append('avatar', file);
  try {
    var res = await fetch('http://localhost:5000/api/upload/avatar', {
      method:'POST',
      headers:{'Authorization':'Bearer '+localStorage.getItem('token')},
      body: formData
    });
    var data = await res.json();
    me.avatar = data.url;
    localStorage.setItem('user', JSON.stringify(me));
    renderProfile();
  } catch(e) { alert('Avatar upload failed!'); }
}

async function acceptConn(userId) {
  await apiFetch(`/users/${userId}/accept`, {method:'POST'});
  document.getElementById('req-'+userId)?.remove();
  loadProfile();
}

</script>
</body>
</html>
