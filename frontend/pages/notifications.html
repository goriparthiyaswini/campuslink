<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notifications — CampusLink</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet"/>
  <style>
    :root{--pink:#FF6B9D;--purple:#9B59F5;--cyan:#06D6A0;--yellow:#FFD166;--bg:#0F0F1A;--card:#1A1A2E;--text:#F0F0FF;--muted:#8888AA;--border:rgba(255,255,255,0.08);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);padding-top:62px;}
    .page{max-width:680px;margin:0 auto;padding:24px 16px;}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
    h1{font-size:1.5rem;font-weight:900;}
    .btn-readall{
      padding:8px 16px;background:rgba(255,255,255,0.06);border:1px solid var(--border);
      border-radius:10px;color:var(--muted);font-family:'Nunito',sans-serif;
      font-weight:700;font-size:0.8rem;cursor:pointer;transition:all 0.2s;
    }
    .btn-readall:hover{color:var(--text);}
    .notif-item{
      background:var(--card);border:1px solid var(--border);border-radius:16px;
      padding:16px 18px;margin-bottom:10px;
      display:flex;gap:12px;align-items:flex-start;
      transition:all 0.2s;animation:fadeIn 0.4s ease;
    }
    .notif-item.unread{
      border-color:rgba(155,89,245,0.3);
      background:rgba(155,89,245,0.05);
    }
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .notif-icon{
      width:42px;height:42px;border-radius:50%;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;font-size:1.1rem;
    }
    .icon-like{background:rgba(255,107,157,0.15);}
    .icon-comment{background:rgba(155,89,245,0.15);}
    .icon-connection{background:rgba(6,214,160,0.15);}
    .icon-message{background:rgba(78,205,196,0.15);}
    .icon-reply{background:rgba(255,209,102,0.15);}
    .notif-body{flex:1;}
    .notif-msg{font-size:0.88rem;font-weight:700;margin-bottom:4px;line-height:1.4;}
    .notif-time{font-size:0.72rem;color:var(--muted);}
    .unread-dot{
      width:8px;height:8px;border-radius:50%;
      background:var(--purple);flex-shrink:0;margin-top:6px;
    }
    .empty{text-align:center;padding:60px;color:var(--muted);}
    .empty-icon{font-size:3rem;margin-bottom:12px;}
    .loading{text-align:center;padding:40px;color:var(--muted);}
  </style>
</head>
<body>
<script src="nav.js"></script>
<div class="page">
  <div class="page-header">
    <h1>🔔 Notifications</h1>
    <button class="btn-readall" onclick="markAllRead()">✓ Mark all read</button>
  </div>
  <div id="notifList"><div class="loading">Loading notifications... 🔔</div></div>
</div>

<script>
window.addEventListener('DOMContentLoaded', function() {
  authGuard();
  loadNotifications();
});

const ICONS = {
  like: { icon:'❤️', cls:'icon-like' },
  comment: { icon:'💬', cls:'icon-comment' },
  connection: { icon:'🤝', cls:'icon-connection' },
  message: { icon:'📩', cls:'icon-message' },
  reply: { icon:'↩️', cls:'icon-reply' }
};

function timeAgo(date) {
  const s = Math.floor((Date.now()-new Date(date))/1000);
  if (s<60) return 'just now';
  if (s<3600) return Math.floor(s/60)+'m ago';
  if (s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

async function loadNotifications() {
  const data = await apiFetch('/notifications');
  if (!data) return;
  const list = document.getElementById('notifList');
  if (!data.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🔔</div><p>No notifications yet.<br>Start interacting to get alerts! ✨</p></div>`;
    return;
  }
  list.innerHTML = data.map(n => {
    const ic = ICONS[n.type] || ICONS.comment;
    return `
    <div class="notif-item ${n.read?'':'unread'}">
      <div class="notif-icon ${ic.cls}">${ic.icon}</div>
      <div class="notif-body">
        <div class="notif-msg">${n.message||'You have a new notification'}</div>
        <div class="notif-time">${timeAgo(n.createdAt)}</div>
      </div>
      ${n.read?'':'<div class="unread-dot"></div>'}
    </div>`;
  }).join('');
}

async function markAllRead() {
  await apiFetch('/notifications/read', {method:'PATCH'});
  loadNotifications();
}

</script>
</body>
</html>
