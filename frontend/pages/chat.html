<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat — CampusLink</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet"/>
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <style>
    :root{--pink:#FF6B9D;--purple:#9B59F5;--cyan:#06D6A0;--bg:#0F0F1A;--card:#1A1A2E;--text:#F0F0FF;--muted:#8888AA;--border:rgba(255,255,255,0.08);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;padding-top:62px;}
    .chat-layout{display:flex;height:calc(100vh - 62px);}
    .chat-sidebar{width:300px;flex-shrink:0;border-right:1px solid var(--border);background:var(--card);display:flex;flex-direction:column;}
    .sidebar-header{padding:16px;border-bottom:1px solid var(--border);}
    .sidebar-title{font-weight:900;font-size:1.1rem;margin-bottom:10px;}
    .search-conv{width:100%;padding:8px 14px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.85rem;outline:none;}
    .search-conv::placeholder{color:var(--muted);}
    .conv-list{flex:1;overflow-y:auto;padding:8px;}
    .conv-item{display:flex;gap:10px;align-items:center;padding:10px;border-radius:14px;cursor:pointer;transition:all 0.2s;margin-bottom:2px;}
    .conv-item:hover{background:rgba(255,255,255,0.06);}
    .conv-item.active{background:rgba(155,89,245,0.15);}
    .conv-avatar{width:40px;height:40px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--pink),var(--purple));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.9rem;color:white;position:relative;}
    .online-dot{position:absolute;bottom:1px;right:1px;width:9px;height:9px;background:var(--cyan);border-radius:50%;border:1.5px solid var(--card);}
    .conv-info{flex:1;min-width:0;}
    .conv-name{font-weight:700;font-size:0.88rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .conv-preview{font-size:0.75rem;color:var(--muted);}
    .chat-area{flex:1;display:flex;flex-direction:column;}
    .chat-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center;background:var(--card);}
    .chat-header-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--purple));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.9rem;color:white;}
    .chat-header-name{font-weight:800;font-size:1rem;}
    .chat-header-status{font-size:0.75rem;color:var(--cyan);}
    .messages-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px;}
    .msg-row{display:flex;gap:8px;align-items:flex-end;animation:msgIn 0.3s ease;}
    @keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .msg-row.mine{flex-direction:row-reverse;}
    .msg-avatar{width:28px;height:28px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--pink),var(--purple));display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:800;color:white;}
    .msg-bubble{max-width:65%;padding:10px 14px;border-radius:18px;font-size:0.88rem;line-height:1.5;}
    .msg-row.theirs .msg-bubble{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-bottom-left-radius:4px;}
    .msg-row.mine .msg-bubble{background:linear-gradient(135deg,var(--pink),var(--purple));color:white;border-bottom-right-radius:4px;}
    .msg-time{font-size:0.65rem;color:var(--muted);margin-top:4px;}
    .msg-row.mine .msg-time{text-align:right;}
    .chat-input-area{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:center;background:var(--card);}
    .msg-input{flex:1;padding:12px 18px;background:rgba(255,255,255,0.05);border:1.5px solid var(--border);border-radius:14px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.95rem;outline:none;transition:border-color 0.3s;}
    .msg-input:focus{border-color:var(--purple);}
    .msg-input::placeholder{color:var(--muted);}
    .btn-send{width:44px;height:44px;background:linear-gradient(135deg,var(--pink),var(--purple));border:none;border-radius:12px;color:white;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
    .btn-send:hover{transform:scale(1.08);}
    .attach-btn{width:40px;height:40px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;transition:all 0.2s;flex-shrink:0;}
    .attach-btn:hover{background:rgba(155,89,245,0.15);}
    .chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:12px;}
    .chat-empty-icon{font-size:4rem;}
  </style>
</head>
<body>
<script src="nav.js"></script>
<div class="chat-layout">
  <div class="chat-sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">💬 Messages</div>
      <input class="search-conv" id="searchConv" placeholder="Search users..."/>
    </div>
    <div class="conv-list" id="convList">
      <div style="padding:20px;color:var(--muted);text-align:center;font-size:0.85rem;">Loading...</div>
    </div>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="chat-empty">
      <div class="chat-empty-icon">💬</div>
      <div style="font-weight:700;font-size:1.1rem;">Select a conversation</div>
      <div style="font-size:0.85rem;">Discover students to start chatting!</div>
    </div>
  </div>
</div>

<script>
var me = {};
var socket = null;
var onlineUsers = [];
var currentRoomId = null;
var currentChatUser = null;
var typingTimer = null;

window.addEventListener('DOMContentLoaded', function() {
  authGuard();
  me = JSON.parse(localStorage.getItem('user') || '{}');

  socket = io('http://localhost:5000');
  socket.emit('user_online', me._id);

  socket.on('online_users', function(users) { onlineUsers = users; });

  socket.on('receive_message', function(data) {
    if (data.roomId === currentRoomId) appendMessage(data, data.senderId === me._id);
  });

  socket.on('user_typing', function(data) {
    if (data.roomId === currentRoomId && data.senderId !== me._id) {
      var ti = document.getElementById('typingIndicator');
      if (ti) ti.style.display = 'flex';
    }
  });

  socket.on('user_stop_typing', function(data) {
    if (data.roomId === currentRoomId) {
      var ti = document.getElementById('typingIndicator');
      if (ti) ti.style.display = 'none';
    }
  });

  document.getElementById('searchConv').addEventListener('input', function() {
    var q = this.value.toLowerCase();
    document.querySelectorAll('.conv-item').forEach(function(el) {
      el.style.display = el.querySelector('.conv-name').textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  });

  loadConversations();
});

async function loadConversations() {
  var data = await apiFetch('/users');
  if (!data) return;
  var list = document.getElementById('convList');
  if (!data.length) {
    list.innerHTML = '<div style="padding:20px;color:var(--muted);text-align:center;">No users found</div>';
    return;
  }
  list.innerHTML = data.map(function(u) {
    return '<div class="conv-item" id="conv-' + u._id + '" onclick="openChat(\'' + u._id + '\',\'' +
      u.name.replace(/'/g, "\\'") + '\',\'' + (u.college || '').replace(/'/g, "\\'") + '\',\'' +
      u.name[0].toUpperCase() + '\')">' +
      '<div class="conv-avatar">' + u.name[0].toUpperCase() + '</div>' +
      '<div class="conv-info"><div class="conv-name">' + u.name + '</div>' +
      '<div class="conv-preview">' + (u.college || 'Student') + '</div></div></div>';
  }).join('');

  var params = new URLSearchParams(location.search);
  var targetUser = params.get('user');
  if (targetUser) {
    var found = data.find(function(u) { return u._id === targetUser; });
    if (found) openChat(found._id, found.name, found.college || '', found.name[0].toUpperCase());
  }
}

async function openChat(userId, name, college, initial) {
  currentChatUser = { _id: userId, name: name, college: college, initial: initial };
  document.querySelectorAll('.conv-item').forEach(function(c) { c.classList.remove('active'); });
  var convEl = document.getElementById('conv-' + userId);
  if (convEl) convEl.classList.add('active');

  var data = await apiFetch('/chat/' + userId);
  if (!data) return;
  currentRoomId = data.roomId;
  socket.emit('join_room', currentRoomId);

  document.getElementById('chatArea').innerHTML =
    '<div class="chat-header">' +
      '<div class="chat-header-avatar">' + initial + '</div>' +
      '<div><div class="chat-header-name">' + name + '</div>' +
      '<div class="chat-header-status">🟢 ' + college + '</div></div>' +
    '</div>' +
    '<div class="messages-area" id="messagesArea">' +
      (data.messages || []).map(function(m) {
        var isMine = m.sender === me._id || (m.sender && m.sender._id === me._id);
        return buildMsgHTML(m, isMine);
      }).join('') +
    '</div>' +
    '<div class="chat-input-area">' +
      '<label class="attach-btn" title="Attach file">📎<input type="file" id="chatFileInput" style="display:none" accept="image/*,video/*,audio/*,.pdf,.doc,.docx" onchange="sendFile(this)"/></label>' +
      '<input class="msg-input" id="msgInput" placeholder="Type a message..."/>' +
      '<button class="btn-send" onclick="sendMessage()">➤</button>' +
    '</div>';

  var ma = document.getElementById('messagesArea');
  ma.scrollTop = ma.scrollHeight;

  document.getElementById('msgInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') sendMessage();
  });
  document.getElementById('msgInput').addEventListener('input', function() {
    socket.emit('typing', { roomId: currentRoomId, senderId: me._id, senderName: me.name });
    clearTimeout(typingTimer);
    typingTimer = setTimeout(function() {
      socket.emit('stop_typing', { roomId: currentRoomId });
    }, 1000);
  });
}

function buildMsgHTML(m, isMine) {
  var initial = isMine ? (me.name ? me.name[0].toUpperCase() : '?') : (currentChatUser ? currentChatUser.initial : '?');
  var time = new Date(m.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  var txt = m.content || '';
  var bubble = '';
  if (txt.indexOf('[Image]') >= 0 && txt.indexOf('http') >= 0) {
    var iurl = txt.split(' ').pop();
    bubble = '<a href="' + iurl + '" target="_blank"><img src="' + iurl + '" style="max-width:220px;max-height:180px;border-radius:10px;display:block"></a>';
  } else if (txt.indexOf('[File]') >= 0 && txt.indexOf('http') >= 0) {
    var parts = txt.split(' ');
    var fu = parts.pop();
    var fn = parts.slice(1).join(' ');
    bubble = '<a href="' + fu + '" target="_blank" style="color:white;text-decoration:underline">&#128196; ' + fn + '</a>';
  } else {
    bubble = txt;
  }
  return '<div class="msg-row ' + (isMine?'mine':'theirs') + '">' +
    '<div class="msg-avatar">' + initial + '</div>' +
    '<div><div class="msg-bubble">' + bubble + '</div>' +
    '<div class="msg-time">' + time + '</div></div></div>';
}
function appendMessage(data, isMine) {
  var ma = document.getElementById('messagesArea');
  if (!ma) return;
  var div = document.createElement('div');
  div.innerHTML = buildMsgHTML({ content: data.message, timestamp: data.timestamp }, isMine);
  ma.appendChild(div.firstElementChild);
  ma.scrollTop = ma.scrollHeight;
}

async function sendFile(input) {
  var file = input.files[0];
  if (!file || !currentRoomId) return;
  var formData = new FormData();
  formData.append('file', file);
  try {
    var res = await fetch('http://localhost:5000/api/upload/single', {
      method:'POST',
      headers:{'Authorization':'Bearer '+localStorage.getItem('token')},
      body: formData
    });
    var data = await res.json();
    var isImg = data.mimetype && data.mimetype.startsWith('image/');
    var msg = isImg ? '📷 [Image] ' + data.url : '📎 [File] ' + data.filename + ' ' + data.url;
    socket.emit('send_message', {roomId:currentRoomId, message:msg, senderId:me._id, senderName:me.name, senderCollege:me.college});
    appendMessage({message:msg, timestamp:new Date()}, true);
  } catch(e) { alert('Upload failed!'); }
  input.value = '';
}

function sendMessage() {
  var input = document.getElementById('msgInput');
  if (!input) return;
  var message = input.value.trim();
  if (!message || !currentRoomId) return;
  socket.emit('send_message', {
    roomId: currentRoomId,
    message: message,
    senderId: me._id,
    senderName: me.name,
    senderCollege: me.college
  });
  // Append immediately for sender (socket won't echo back to sender)
  appendMessage({ message: message, timestamp: new Date() }, true);
  input.value = '';
}
</script>
</body>
</html>
