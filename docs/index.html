<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CampusLink — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet"/>
  <style>
    :root{--pink:#FF6B9D;--purple:#9B59F5;--cyan:#06D6A0;--blue:#4ECDC4;--bg:#0F0F1A;--card:#1A1A2E;--text:#F0F0FF;--muted:#8888AA;--border:rgba(255,255,255,0.08);}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
    .blob{position:fixed;border-radius:50%;filter:blur(80px);opacity:0.15;pointer-events:none;animation:float 8s ease-in-out infinite;}
    .blob1{width:400px;height:400px;background:var(--pink);top:-100px;left:-100px;}
    .blob2{width:350px;height:350px;background:var(--purple);bottom:-50px;right:-50px;animation-delay:3s;}
    .blob3{width:250px;height:250px;background:var(--cyan);top:50%;left:50%;animation-delay:6s;}
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-30px)}}
    .container{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;z-index:1;}
    .auth-box{background:rgba(26,26,46,0.9);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:28px;padding:40px 36px;width:100%;max-width:430px;box-shadow:0 32px 64px rgba(0,0,0,0.4);animation:slideUp 0.5s ease;}
    @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}
    .logo{text-align:center;margin-bottom:28px;}
    .logo-text{font-family:'Pacifico',cursive;font-size:2.2rem;background:linear-gradient(135deg,var(--pink),var(--purple),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .logo-sub{color:var(--muted);font-size:0.85rem;margin-top:4px;}
    .tabs{display:flex;background:rgba(255,255,255,0.05);border-radius:12px;padding:4px;margin-bottom:24px;}
    .tab{flex:1;padding:9px;text-align:center;border-radius:8px;cursor:pointer;font-weight:700;font-size:0.9rem;color:var(--muted);transition:all 0.3s;border:none;background:transparent;font-family:'Nunito',sans-serif;}
    .tab.active{background:linear-gradient(135deg,var(--pink),var(--purple));color:white;}
    .form{display:none;} .form.active{display:block;}
    .fg{margin-bottom:15px;}
    .fg label{display:block;font-size:0.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:6px;}
    .fg input,.fg select{width:100%;padding:11px 14px;background:rgba(255,255,255,0.05);border:1.5px solid var(--border);border-radius:11px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.92rem;outline:none;transition:border-color 0.3s;}
    .fg input:focus,.fg select:focus{border-color:var(--purple);}
    .fg select option{background:#1A1A2E;}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .btn-main{width:100%;padding:13px;background:linear-gradient(135deg,var(--pink),var(--purple));color:white;border:none;border-radius:13px;font-family:'Nunito',sans-serif;font-size:0.95rem;font-weight:800;cursor:pointer;margin-top:6px;transition:all 0.2s;}
    .btn-main:hover{transform:translateY(-2px);}
    .msg{margin-top:12px;padding:11px 14px;border-radius:10px;font-size:0.85rem;font-weight:600;display:none;}
    .msg.success{background:rgba(6,214,160,0.12);color:var(--cyan);border:1px solid rgba(6,214,160,0.25);}
    .msg.error{background:rgba(255,107,157,0.12);color:var(--pink);border:1px solid rgba(255,107,157,0.25);}
    .pills{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;}
    .pill{padding:4px 11px;border-radius:20px;font-size:0.75rem;font-weight:700;cursor:pointer;border:1.5px solid var(--border);color:var(--muted);transition:all 0.2s;background:transparent;font-family:'Nunito',sans-serif;}
    .pill.active{background:linear-gradient(135deg,var(--cyan),var(--blue));border-color:transparent;color:white;}
    .loader{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="blob blob1"></div><div class="blob blob2"></div><div class="blob blob3"></div>
<div class="container">
  <div class="auth-box">
    <div class="logo">
      <div class="logo-text">CampusLink 🎓</div>
      <div class="logo-sub">Connect with students across colleges</div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('register')">Sign Up</button>
    </div>
    <div class="form active" id="loginForm">
      <div class="fg"><label>Email</label><input type="email" id="loginEmail" placeholder="your@email.com"/></div>
      <div class="fg"><label>Password</label><input type="password" id="loginPass" placeholder="••••••••"/></div>
      <button class="btn-main" onclick="login()">🚀 Login</button>
      <div class="msg" id="loginMsg"></div>
    </div>
    <div class="form" id="registerForm">
      <div class="fg"><label>Full Name</label><input type="text" id="regName" placeholder="Your Name"/></div>
      <div class="fg"><label>Email</label><input type="email" id="regEmail" placeholder="your@email.com"/></div>
      <div class="fg"><label>Password</label><input type="password" id="regPass" placeholder="Min 6 characters"/></div>
      <div class="fg"><label>College</label><input type="text" id="regCollege" placeholder="Your College Name"/></div>
      <div class="row2">
        <div class="fg"><label>Year</label><select id="regYear"><option value="">Select</option><option>1st Year</option><option>2nd Year</option><option>3rd Year</option><option>4th Year</option></select></div>
        <div class="fg"><label>Branch</label><input type="text" id="regBranch" placeholder="CSE, ECE..."/></div>
      </div>
      <div class="fg"><label>Skills</label><div class="pills">
        <button class="pill" onclick="togglePill(this,'skill')">HTML</button>
        <button class="pill" onclick="togglePill(this,'skill')">JavaScript</button>
        <button class="pill" onclick="togglePill(this,'skill')">Python</button>
        <button class="pill" onclick="togglePill(this,'skill')">Java</button>
        <button class="pill" onclick="togglePill(this,'skill')">React</button>
        <button class="pill" onclick="togglePill(this,'skill')">Node.js</button>
        <button class="pill" onclick="togglePill(this,'skill')">ML/AI</button>
        <button class="pill" onclick="togglePill(this,'skill')">DSA</button>
      </div></div>
      <div class="fg"><label>Interests</label><div class="pills">
        <button class="pill" onclick="togglePill(this,'interest')">Hackathons</button>
        <button class="pill" onclick="togglePill(this,'interest')">Coding</button>
        <button class="pill" onclick="togglePill(this,'interest')">Music</button>
        <button class="pill" onclick="togglePill(this,'interest')">Gaming</button>
        <button class="pill" onclick="togglePill(this,'interest')">Sports</button>
        <button class="pill" onclick="togglePill(this,'interest')">Entrepreneurship</button>
      </div></div>
      <button class="btn-main" onclick="register()">🎉 Create Account</button>
      <div class="msg" id="registerMsg"></div>
    </div>
  </div>
</div>
<script>
  if (localStorage.getItem('token')) window.location.href='/feed.html';
  let selectedSkills=[], selectedInterests=[];
  function switchTab(tab){
    document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(tab==='login'&&i===0)||(tab==='register'&&i===1)));
    document.getElementById('loginForm').classList.toggle('active',tab==='login');
    document.getElementById('registerForm').classList.toggle('active',tab==='register');
  }
  function togglePill(el,type){
    el.classList.toggle('active');
    const val=el.textContent.trim();
    if(type==='skill') selectedSkills=selectedSkills.includes(val)?selectedSkills.filter(s=>s!==val):[...selectedSkills,val];
    else selectedInterests=selectedInterests.includes(val)?selectedInterests.filter(s=>s!==val):[...selectedInterests,val];
  }
  function showMsg(id,text,type){const el=document.getElementById(id);el.textContent=text;el.className='msg '+type;el.style.display='block';}
  async function login(){
    const email=document.getElementById('loginEmail').value.trim();
    const password=document.getElementById('loginPass').value;
    if(!email||!password) return showMsg('loginMsg','Please fill all fields','error');
    const btn=document.querySelector('#loginForm .btn-main');
    btn.innerHTML='<span class="loader"></span>Logging in...';btn.disabled=true;
    try{
      const res=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
      const data=await res.json();
      if(!res.ok) throw new Error(data.message||'Login failed');
      localStorage.setItem('token',data.token);
      localStorage.setItem('user',JSON.stringify(data.user));
      showMsg('loginMsg','✅ Success! Redirecting...','success');
      setTimeout(()=>window.location.href='/feed.html',500);
    }catch(e){showMsg('loginMsg','❌ '+e.message,'error');btn.innerHTML='🚀 Login';btn.disabled=false;}
  }
  async function register(){
    const name=document.getElementById('regName').value.trim();
    const email=document.getElementById('regEmail').value.trim();
    const password=document.getElementById('regPass').value;
    const college=document.getElementById('regCollege').value.trim();
    const year=document.getElementById('regYear').value;
    const branch=document.getElementById('regBranch').value.trim();
    if(!name||!email||!password||!college) return showMsg('registerMsg','Fill all required fields','error');
    if(password.length<6) return showMsg('registerMsg','Password min 6 characters','error');
    const btn=document.querySelector('#registerForm .btn-main');
    btn.innerHTML='<span class="loader"></span>Creating...';btn.disabled=true;
    try{
      const res=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password,college,year,branch,skills:selectedSkills,interests:selectedInterests})});
      const data=await res.json();
      if(!res.ok) throw new Error(data.message||'Registration failed');
      localStorage.setItem('token',data.token);
      localStorage.setItem('user',JSON.stringify(data.user));
      showMsg('registerMsg','🎉 Account created! Redirecting...','success');
      setTimeout(()=>window.location.href='/feed.html',500);
    }catch(e){showMsg('registerMsg','❌ '+e.message,'error');btn.innerHTML='🎉 Create Account';btn.disabled=false;}
  }
</script>
</body>
</html>
